[tox]
skipsdist = true
# lint + typing envs disabled — 2021/2022-era pins (flake8 3.9, black 22.3,
# mypy 0.901) don't run on py314. Re-enable by adding `, lint, typing` back
# after the dep bump tracked on the fork's issue list.
envlist =  py{314}
skip_missing_interpreters = True
cs_exclude_words = hass,unvalid

[gh-actions]
python =
  3.14: py314

[testenv]
passenv = TOXENV,CI
setenv =
    LANG=en_US.UTF-8
    PYTHONPATH = {toxinidir}
deps =
    -r{toxinidir}/requirements_test.txt
commands =
    pytest -v --durations=10 {posargs:tests}

[testenv:lint]
ignore_errors = True
deps =
    {[testenv]deps}
commands =
    codespell -q 4 -L {[tox]cs_exclude_words} --skip="*.pyc,*.pyi,*~,*.json" custom_components
    flake8 custom_components
    black --fast --check .
    pydocstyle -v custom_components
#    pylint custom_components/localtuya --rcfile=pylint.rc

[testenv:typing]
commands =
    mypy --ignore-missing-imports --follow-imports=skip custom_components
